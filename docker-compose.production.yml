services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psychologist-site
    restart: unless-stopped
    ports:
      # Сайт открывается по IP без указания порта
      - '80:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: '0.0.0.0'
      CONTENT_FILE_PATH: ${CONTENT_FILE_PATH:-/app/runtime-data/content.json}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-}
      DEBUG_MODE: ${DEBUG_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # Живой контент хранится отдельно от git-репозитория
      - ${CONTENT_STORAGE_DIR:-./runtime-data}:/app/runtime-data
      # Загруженные фото сохраняются между перезапусками
      - ./public/uploads:/app/public/uploads
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
